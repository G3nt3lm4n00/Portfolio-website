<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon — Portfolio</title>
    <meta name="description" content="Something incredible is being crafted. Stay tuned for the launch." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #07080d;
            --accent1: #c084fc;
            --accent2: #818cf8;
            --accent3: #38bdf8;
            --glass: rgba(255, 255, 255, 0.045);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --muted: rgba(226, 232, 240, 0.45);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── Canvas ── */
        #cvs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Gradient orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #c084fc44, transparent 70%);
            top: -180px;
            left: -150px;
            animation: drift1 20s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #38bdf844, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation: drift2 25s ease-in-out infinite alternate;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #818cf833, transparent 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: drift3 18s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(60px, 40px) scale(1.15);
            }
        }

        @keyframes drift2 {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(-50px, -30px) scale(1.1);
            }
        }

        @keyframes drift3 {
            from {
                transform: translate(-50%, -50%) scale(1);
            }

            to {
                transform: translate(-48%, -52%) scale(1.2);
            }
        }

        /* ── Page layout ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* ── Badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 999px;
            background: var(--glass);
            border: 1px solid var(--border);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent1);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeDown 0.8s ease both;
        }

        .badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent1);
            box-shadow: 0 0 8px var(--accent1);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Headline ── */
        h1 {
            font-size: clamp(3rem, 9vw, 7.5rem);
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 30%, var(--accent1) 60%, var(--accent3) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeDown 0.9s ease 0.1s both;
            margin-bottom: 1.25rem;
        }

        .sub {
            font-size: clamp(1rem, 2.2vw, 1.3rem);
            font-weight: 300;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.65;
            animation: fadeDown 1s ease 0.2s both;
            margin-bottom: 3rem;
        }

        /* ── Aperture graphic ── */
        .aperture-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 3.5rem;
            animation: fadeDown 1s ease 0.3s both;
        }

        .aperture {
            width: 100%;
            height: 100%;
            position: relative;
            animation: apertureRotate 24s linear infinite;
        }

        .blade {
            position: absolute;
            width: 52%;
            height: 52%;
            top: 24%;
            left: 24%;
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.18), rgba(56, 189, 248, 0.08));
            border: 1px solid rgba(192, 132, 252, 0.28);
            backdrop-filter: blur(6px);
            border-radius: 0 58% 0 58%;
            transform-origin: center center;
        }

        .blade:nth-child(1) {
            transform: rotate(0deg);
        }

        .blade:nth-child(2) {
            transform: rotate(60deg);
        }

        .blade:nth-child(3) {
            transform: rotate(120deg);
        }

        .blade:nth-child(4) {
            transform: rotate(180deg);
        }

        .blade:nth-child(5) {
            transform: rotate(240deg);
        }

        .blade:nth-child(6) {
            transform: rotate(300deg);
        }

        .lens-ring {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 1px solid rgba(192, 132, 252, 0.2);
        }

        .lens-ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(56, 189, 248, 0.15);
        }

        .lens-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.55) 0%, rgba(56, 189, 248, 0.2) 50%, transparent 80%);
            animation: lensGlow 3.5s ease-in-out infinite;
        }

        @keyframes apertureRotate {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes lensGlow {

            0%,
            100% {
                box-shadow: 0 0 18px rgba(192, 132, 252, 0.45), 0 0 36px rgba(192, 132, 252, 0.18);
            }

            50% {
                box-shadow: 0 0 28px rgba(192, 132, 252, 0.75), 0 0 55px rgba(56, 189, 248, 0.28);
            }
        }



        /* ── Socials ── */
        .socials {
            display: flex;
            gap: 1rem;
            animation: fadeDown 1s ease 0.5s both;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            color: var(--muted);
            text-decoration: none;
            transition: border-color 0.3s, color 0.3s, transform 0.25s;
        }

        .social-link:hover {
            border-color: var(--accent1);
            color: #fff;
            transform: translateY(-3px);
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }



        /* ── Animations ── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-22px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translate(-50%, 18px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>

<body>

    <canvas id="cvs"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="page">

        <div class="badge">Coming Soon</div>

        <h1>Something<br />Beautiful<br />Awaits.</h1>

        <p class="sub">
            A new portfolio experience is being crafted with care.
        </p>

        <!-- Aperture graphic -->
        <div class="aperture-wrap">
            <div class="aperture">
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
            </div>
            <div class="lens-ring-outer"></div>
            <div class="lens-ring"></div>
            <div class="lens-center"></div>
        </div>



        <!-- Socials -->
        <div class="socials">
            <!-- Instagram -->
            <a href="https://www.instagram.com/urban.peter08/" class="social-link" aria-label="Instagram"
                id="social-instagram">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                </svg>
            </a>

        </div>

    </main>



    <script>




        /* ── Particle canvas ── */
        (function () {
            const canvas = document.getElementById('cvs');
            const ctx = canvas.getContext('2d');
            let W, H, particles;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                init();
            }

            const COUNT = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 12000));
            const COLORS = ['rgba(192,132,252,', 'rgba(129,140,248,', 'rgba(56,189,248,'];

            function rand(a, b) { return a + Math.random() * (b - a); }

            function init() {
                particles = Array.from({ length: COUNT }, () => ({
                    x: rand(0, W), y: rand(0, H),
                    vx: rand(-0.25, 0.25), vy: rand(-0.25, 0.25),
                    r: rand(1, 2.5),
                    alpha: rand(0.2, 0.7),
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    pulse: rand(0, Math.PI * 2),
                    pulseSpeed: rand(0.008, 0.02)
                }));
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (const p of particles) {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                    p.pulse += p.pulseSpeed;
                    const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color + a + ')';
                    ctx.fill();
                }
                // Connect nearby particles
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(192,132,252,${0.07 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            draw();
        })();
    </script>
</body>

</html>
