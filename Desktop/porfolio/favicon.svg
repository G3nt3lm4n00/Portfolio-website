<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>

  <!-- Eye outer fill (white almond) -->
  <path d="M8 50 Q50 14 92 50 Q50 86 8 50 Z" fill="white"/>

  <!-- Dark inner cut — creates the white rim of the eye -->
  <path d="M20 50 Q50 26 80 50 Q50 74 20 50 Z" fill="#0d0d0d"/>

  <!-- Iris (white filled circle) -->
  <circle cx="50" cy="50" r="17" fill="white"/>

  <!-- Pupil (dark) -->
  <circle cx="50" cy="50" r="9" fill="#0d0d0d"/>

  <!-- Crosshair inside pupil — references camera focus & terminal cursor -->
  <line x1="50" y1="44" x2="50" y2="56" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44" y1="50" x2="56" y2="50" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Catchlight — brings the eye to life, like a lens reflection -->
  <circle cx="55" cy="45" r="2.8" fill="white"/>

</svg>
